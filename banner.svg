<svg width="1600" height="520" viewBox="0 0 1600 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520">
      <stop offset="0%" stop-color="#3CC8F5"/>
      <stop offset="100%" stop-color="#4169F6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="15" stdDeviation="18" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1600" height="520" rx="40" fill="url(#bg)"/>

  <!-- LEFT ICON CARD -->
  <g filter="url(#shadow)">
    <rect x="120" y="110" width="420" height="300" rx="40" fill="white"/>
  </g>

  <!-- EKZ LOGO BLOCK -->
  <rect x="230" y="150" width="200" height="130" fill="#4A92F5"/>
  <text x="330" y="235" text-anchor="middle" font-size="80" font-family="Arial" fill="white" font-weight="700">EKZ</text>

  <!-- CHF -->
  <text x="330" y="320" text-anchor="middle" font-size="60" font-family="Arial" fill="#4A82ED" font-weight="300">CHF</text>

  <!-- GRAPH -->
  <rect x="260" y="330" width="40" height="60" fill="#4A82ED"/>
  <rect x="320" y="305" width="40" height="85" fill="#4A82ED"/>
  <rect x="380" y="270" width="40" height="120" fill="#4A82ED"/>

  <!-- TITLE -->
  <text x="640" y="210" font-size="72" font-family="Arial" fill="white" font-weight="700">
    EKZ Tariff
  </text>

  <text x="640" y="270" font-size="32" font-family="Arial" fill="white" opacity="0.9">
    Raw dynamic electricity tariffs for Home Assistant
  </text>

  <!-- TAGS -->
  <rect x="640" y="310" width="220" height="50" rx="25" fill="rgba(255,255,255,0.18)"/>
  <text x="750" y="343" text-anchor="middle" font-size="22" font-family="Arial" fill="white" font-weight="600">myEKZ OAuth</text>

  <rect x="880" y="310" width="240" height="50" rx="25" fill="rgba(255,255,255,0.18)"/>
  <text x="1000" y="343" text-anchor="middle" font-size="22" font-family="Arial" fill="white" font-weight="600">96 Slots / Day</text>

  <rect x="1140" y="310" width="200" height="50" rx="25" fill="rgba(255,255,255,0.18)"/>
  <text x="1240" y="343" text-anchor="middle" font-size="22" font-family="Arial" fill="white" font-weight="600">Baseline</text>

  <!-- FOOTNOTE -->
  <text x="640" y="420" font-size="26" font-family="Arial" fill="white" opacity="0.9">
    Provider integration for Tariff Saver optimisation
  </text>

</svg>
</text>

<!-- tags -->
<rect x="560" y="290" width="220" height="52" rx="26" fill="white" opacity="0.18"/>
<text x="670" y="325" text-anchor="middle" font-size="22" font-family="Arial" fill="white" font-weight="600">myEKZ OAuth</text>

<rect x="800" y="290" width="240" height="52" rx="26" fill="white" opacity="0.18"/>
<text x="920" y="325" text-anchor="middle" font-size="22" font-family="Arial" fill="white" font-weight="600">96 Slots / Day</text>


</linearGradient>
</defs>

<rect width="1600" height="500" rx="40" fill="url(#bg)"/>

<!-- icon card -->
<rect x="120" y="90" width="360" height="320" rx="40" fill="white" opacity="0.95"/>

<!-- real icon -->
<image href="icon.png" x="170" y="140" width="260" height="260"/>

<!-- title -->
<text x="560" y="190" font-size="72" font-family="Arial, Helvetica, sans-serif" fill="white" font-weight="700">
EKZ Tariff
</text>

<!-- subtitle -->
<text x="560" y="245" font-size="34" font-family="Arial, Helvetica, sans-serif" fill="white" opacity="0.9">

<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boxBlue" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5CA9F8"/>
      <stop offset="1" stop-color="#3D78F1"/>
    </linearGradient>
    <linearGradient id="boxDark" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#263A71"/>
      <stop offset="1" stop-color="#172749"/>
    </linearGradient>
    <filter id="soft" x="-20" y="-20" width="1240" height="420" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1C2F62" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="380" rx="26" fill="#F5F8FF"/>
  <g filter="url(#soft)">
    <rect x="70" y="130" width="230" height="110" rx="24" fill="url(#boxDark)"/>
    <text x="185" y="177" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="white">EKZ API</text>
    <text x="185" y="210" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#D9E6FF">myEKZ + Public</text>

    <rect x="485" y="110" width="230" height="150" rx="24" fill="url(#boxBlue)"/>
    <text x="600" y="160" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="white">EKZ Tariff</text>
    <text x="600" y="194" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="500" fill="#EEF5FF">Raw Provider</text>
    <text x="600" y="224" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#EEF5FF">96 slots · components · baseline</text>

    <rect x="900" y="110" width="230" height="150" rx="24" fill="url(#boxDark)"/>

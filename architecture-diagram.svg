  <path d="M300 185H455" stroke="#5A83EE" stroke-width="8" stroke-linecap="round"/>
  <path d="M444 173L462 185L444 197" stroke="#5A83EE" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>


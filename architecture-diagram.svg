    <text x="1015" y="194" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="500" fill="#D9E6FF">Optimisation Layer</text>
    <text x="1015" y="224" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#D9E6FF">windows · costs · automations</text>

    <rect x="900" y="285" width="230" height="52" rx="18" fill="#FFFFFF"/>
    <text x="1015" y="318" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#233A73">EV / Battery / HA Logic</text>
